# Render Blueprint for the HelPhone ZK prover service.
# The prover runs the Noir + Barretenberg backend that the Vercel frontend
# calls via VITE_ZK_PROVER_URL. Vercel only serves the static build, so the
# heavy proving step must live on a real Node host like this one.
services:
  - type: web
    name: helphone-zk-prover
    runtime: node
    plan: free            # 512MB — Barretenberg may OOM; bump to "starter" if it crashes
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: "20"
